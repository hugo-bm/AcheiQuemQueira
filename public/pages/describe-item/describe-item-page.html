<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/public/icons/favicon-32.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../../css/core/reset.css" />
    <title>Descrição - AQQ</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- CSS - AQQ -->
    <link rel="stylesheet" href="../../css/core/variables.css" />
    <link rel="stylesheet" href="../../css/core/typography.css" />
    <link rel="stylesheet" href="../../css/core/utilities.css" />
    <link rel="stylesheet" href="../../css/core/animations.css" />
    <link rel="stylesheet" href="../../css/core/responsive.css" />

    <script type="module" src="./describe-item-page.js" defer></script>
</head>

<body>
    <div id="alert-container" class="position-fixed top-0 start-50 translate-middle-x aq-w-sm-100 aq-w-lg-25 p-3"
     style="max-width: 1080px; z-index: 1000;"></div>
    <div class=" ">


        <main class="container aq-container pb-4 pb-md-5 pt-3 aq-w-sm-100 aq-w-lg-75"  style="max-width: 1080px;">
            <div class="d-flex justify-content-center align-items-center row" >
                <header class="d-flex align-items-center w-100 gap-3 mb-4 aq-slide-up">
                    <button type="button" class="btn aq-btn-secundary p-0 text-decoration-none d-flex align-items-center justify-content-center"
                        data-action="back" style="min-width:48px; min-height:48px; z-index:2;">
                        <i class="bi fs-3 bi-arrow-left"></i>
                    </button>

                    <h1 class="aq-h2 text-primary mx-auto  fw-semibold mb-0 h-md-3">
                        Descrição do anúncio
                    </h1>
                </header>

                <section class="card aq-card-surface aq-shadow-sm aq-radius-md mb-4 aq-slide-up">
                    <div class="card-body m-1">
                        <div data-container="carousel" class="mb-3 mx-auto aq-text-logo" style="max-width: 640px;max-height: 480px;"></div>
                        <div data-container="quality-badge" class="mb-3"></div>
                        <div class="mb-4">
                            <h2 class="h4 fw-bold mb-3 aq-text-logo aq-text-shadow-sm" data-field="title"></h2>
                            <div class="display-6 fw-bold text-primary mb-3" data-field="price"></div>
                            <div class="d-flex flex-column gap-2" data-container="item-info"></div>
                        </div>
                        <div data-container="owner-section" class="mb-4"></div>
                        <div data-container="actions" class="mb-4"></div>

                    </div>
                </section>

                <section data-container="proposals-section" class="mb-4"></section>
            </div>
        </main>
    </div>

    <div class="modal fade aq-slide-up" id="proposal-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title text-primary">
                        Enviar proposta
                    </h5>

                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <p class="small aq-text-soft">
                        Faça a sua proposta! Lembre-se de que as condições descritas pelo anunciante precisam ser seguidas.
                    </p>

                    <div class="mb-3">

                        <label for="proposal-message" class="form-label text-secondary">
                            Mensagem <span class="aq-text-light" style="font-size: small;">(opcional)</span>
                        </label>

                        <textarea id="proposal-message" class="form-control" rows="4"></textarea>

                    </div>

                </div>

                <div class="modal-footer d-flex justify-content-evenly">

                    <button type="button" class="btn aq-btn-outline-danger " data-bs-dismiss="modal">
                        Cancelar
                    </button>

                    <button type="button" class="btn aq-btn-primary" data-action="submit-proposal">
                        Enviar proposta
                    </button>

                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="delete-item-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title text-primary">
                        Excluir anúncio
                    </h5>

                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>

                </div>

                <div class="modal-body">

                    <p class="mb-0 text-secondary">
                        Deseja realmente excluir este anúncio?
                    </p>

                </div>

                <div class="modal-footer">

                    <button type="button" class="btn aq-btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>

                    <button type="button" class="btn aq-btn-danger" data-action="confirm-delete">
                        Excluir
                    </button>

                </div>

            </div>
        </div>
    </div>
    <!-- Bootstrap Bundle -->
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
