<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../../icons/favicon-32.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../../css/core/reset.css" />

    <title>Minhas Avaliações - AQQ</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- CSS - AQQ -->
    <link rel="stylesheet" href="../../css/core/variables.css" />
    <link rel="stylesheet" href="../../css/core/typography.css" />
    <link rel="stylesheet" href="../../css/core/utilities.css" />
    <link rel="stylesheet" href="../../css/core/animations.css" />
    <link rel="stylesheet" href="../../css/core/responsive.css" />

    <script type="module" src="./my-list-ratings-page.js" defer></script>
</head>

<body>

    <!-- Alert Container -->
    <div id="alert-container" class="position-fixed top-0 start-50 translate-middle-x aq-w-sm-100 aq-w-lg-50 p-3" style="z-index:1080;"></div>

    <main class="container aq-container pb-4 pt-2">

        <!-- Header -->
        <header class="d-flex align-items-center aq-surface aq-shadow-sm border border-bottom-1 aq-radius-md gap-3 mb-4 bg-primary w-100"
        >

            <button id="back-button" type="button"
                class="btn aq-btn-secundary aq-radius-md border-end-0 border-top-0 border-bottom-0 aq-clickable d-flex align-items-center justify-content-center"
                aria-label="Voltar para dashboard"
                style="min-width:48px; min-height:48px;">
                <i class="bi bi-arrow-left fs-3" aria-hidden="true"></i>
            </button>
            <h1 id="page-title" class="aq-h2 text-light aq-text-shadow-sm fw-semibold m-0">Minhas Avaliações</h1>

        </header>

        <!-- Ratings List -->
        <section id="ratings-container" class="w-100" aria-live="polite">
        </section>
    </main>

    <!-- Bootstrap Bundle -->
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
