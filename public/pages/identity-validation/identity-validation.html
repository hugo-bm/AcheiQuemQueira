<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/public/icons/favicon-32.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../../css/core/reset.css" />

    <title>Validação de identidade - AQQ</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- CSS - AQQ -->
    <link rel="stylesheet" href="../../css/core/variables.css" />
    <link rel="stylesheet" href="../../css/core/typography.css" />
    <link rel="stylesheet" href="../../css/core/utilities.css" />
    <link rel="stylesheet" href="../../css/core/animations.css" />
    <link rel="stylesheet" href="../../css/core/responsive.css" />
    <script type="module" src="./identity-validation.js"></script>

</head>

<body>

    <div id="alert-container" class="position-fixed top-0 start-50 translate-middle-x aq-w-sm-100 aq-w-lg-25 p-3" style="
            z-index:1080;
            width:min(100%,640px);
            margin-top:1rem;"></div>

    <main class="container aq-container min-vh-100 d-flex flex-column aq-fade-in align-items-center pb-4 pt-3">

        <img src="../../icons/logo-principal-horizontal.svg" alt="AQQ" style="max-height: 90px;"
            class="mb-4 img-fluid  aq-fade-in">

        <h1 class="aq-h1 text-secondary fw-bold text-center mt-4 mb-4 aq-slide-up">
            Validação de identidade
        </h1>

        <div id="card-conteiner" class="card aq-card-surface aq-radius-sm aq-shadow-sm w-100 aq-slide-up" style="max-width:720px;">
            <div class="card-body d-flex flex-column align-items-center justify-content-center p-4">
                <div id="validation-area" class="d-flex flex-column gap-3 w-100 align-items-center justify-content-center">
                        <video id="camera-preview" class="w-100 rounded aq-shadow-sm d-none" autoplay playsinline muted
                            width="640px" style="object-fit: fill;"></video>
                            <button id="toggle-camera-button" type="button"
                                class="btn aq-btn-primary aq-shadow-md rounded-circle d-flex align-items-center justify-content-center position-absolute bottom-3 end-0 me-5 d-none"
                                aria-label="Alternar Câmera" style="min-width: 48px; max-height: 48px; max-width: 68px;max-height: 68px; z-index: 100; opacity: 0.92;">
                                <i class="bi bi-arrow-repeat fs-5"></i>
                            </button>
                        <canvas id="freeze-canvas" class="w-100 rounded aq-shadow-sm d-none"
                            style="max-width: 640px;" style="object-fit: fill;"></canvas>
                        <div id="status-area" class="text-center py-2"></div>  
                </div>

                <div id="fallback-area" class="d-none text-center">

                    <i class="bi bi-camera-video-off display-1 text-secondary"></i>

                    <h4 class="mt-3">
                        Não foi possível acessar sua câmera
                    </h4>

                    <p class="text-muted">
                        Você pode continuar utilizando o aplicativo normalmente.
                    </p>

                    <button id="fallback-button" type="button" class="btn aq-btn-primary w-100">
                        Vamos começar!
                    </button>

                </div>

            </div>
        </div>

    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
