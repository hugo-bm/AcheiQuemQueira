<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/assets/icons/favicon-32.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../../css/core/reset.css" />
    <title>AQQ - Cadastre-se</title>

       <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- CSS - AQQ -->
    <link rel="stylesheet" href="../../css/core/variables.css" />
    <link rel="stylesheet" href="../../css/core/typography.css" />
    <link rel="stylesheet" href="../../css/core/utilities.css" />
    <link rel="stylesheet" href="../../css/core/animations.css" />
    <link rel="stylesheet" href="../../css/core/responsive.css" />

    <script type="module" src="./register-page.js" defer>
    </script>
</head>

<body>

    <!-- Alerts -->

    <div
        id="alert-container"
        class="position-fixed top-0 start-50 translate-middle-x aq-w-sm-100 aq-w-lg-25 p-3"
        style="
            z-index: 1080;
            width: min(100%, 640px);
            margin-top: 1rem;
        ">
    </div>

    <main class="
                container
                aq-container
                min-vh-100
                d-flex
                flex-column
                justify-content-center
                align-items-center
                pb-4 pt-3
                aq-fade-in
            ">
    
        <!-- Logo -->
    
        <div class="d-flex justify-content-center mb-4 aq-fade-in">
            <img src="../../icons/logo-principal-horizontal.svg" alt="AQQ" class="img-fluid aq-fade-in" style="max-height: 90px;">
        </div>
    
        <!-- Title -->
    
        <h1 class="
                    aq-h1
                    text-secondary
                    fw-bold
                    text-center
                    mb-4
                    aq-fade-in
                ">
            Cadastre-se
        </h1>
    
        <!-- Card -->
    
        <div class="
                    card aq-card-surface
                    shadow-sm
                    w-100
                    aq-radius-sm
                    aq-slide-up
                " style="max-width: 720px;">
    
            <div class="card-body">
    
                <!-- BLOCO 1 -->
    
                <div class="row g-3">
    
                    <div class="col-12">
                        <label for="cpf-cnpj" class="form-label">
                            CPF/CNPJ
                        </label>
    
                        <input id="cpf-cnpj" type="text" class="form-control" placeholder="CPF ou CNPJ">
    
                        <div class="invalid-feedback" data-error-for="cpf-cnpj">
                        </div>
                    </div>
    
                    <div class="col-12">
                        <label for="name" class="form-label">
                            Nome
                        </label>
    
                        <input id="name" type="text" class="form-control">
    
                        <div class="invalid-feedback" data-error-for="name">
                        </div>
                    </div>
    
                    <div class="col-12">
                        <label for="email" class="form-label">
                            Email
                        </label>
    
                        <input id="email" type="email" class="form-control">
    
                        <div class="invalid-feedback" data-error-for="email">
                        </div>
                    </div>
    
                    <div class="col-12">
                        <label for="phone" class="form-label">
                            Telefone
                        </label>
    
                        <input id="phone" type="tel" class="form-control">
    
                        <div class="invalid-feedback" data-error-for="phone">
                        </div>
                    </div>
    
                </div>
    
                <hr class="my-4">
    
                <!-- BLOCO 2 -->
    
                <div class="row g-3">
    
                    <div class="col-12">
                        <label for="password" class="form-label">
                            Senha
                        </label>
    
                        <input id="password" type="password" class="form-control">
    
                        <div class="invalid-feedback" data-error-for="password">
                        </div>
                    </div>
    
                    <div class="col-12">
                        <label for="confirm-password" class="form-label">
                            Confirmar Senha
                        </label>
    
                        <input id="confirm-password" type="password" class="form-control">
    
                        <div class="invalid-feedback" data-error-for="confirm-password">
                        </div>
                    </div>
    
                </div>
    
                <hr class="my-4">
    
                <!-- BLOCO 3 -->
    
                <div class="row g-3">    
    <!-- Dropdown de Estado -->
    <div class="col-12 col-md-6">
        <label for="state" class="form-label">
            Estado
        </label>
        <select id="state" class="form-select" autocomplete="address-level1">
            <option value="">Selecione o Estado</option>
        </select>    
        <div class="invalid-feedback" data-error-for="state"></div>
    </div>    

        <!-- Dropdown de Cidade -->
        <div class="col-12 col-md-6">
            <label for="city" class="form-label">
                Cidade
            </label>
            <select id="city" class="form-select" autocomplete="address-level2" disabled>
                <option value="">Selecione a Cidade</option>
            </select>
            <div class="invalid-feedback" data-error-for="city"></div>
        </div>
        
        <!-- Dropdown de Bairro -->
        <div class="col-12">
            <label for="neighborhood" class="form-label">
                Bairro
            </label>
            <select id="neighborhood" class="form-select" disabled>
                <option value="">Selecione o Bairro</option>
            </select>
            <div class="invalid-feedback" data-error-for="neighborhood"></div>
        </div>
        
        <!-- Input de Endereço (Mantido Texto Puro) -->
        <div class="col-12">
            <label for="address" class="form-label">
                Endereço
            </label>
            <input id="address" type="text" class="form-control" placeholder="Rua, número, bloco ou complemento"
                autocomplete="street-address">
            <div class="invalid-feedback" data-error-for="address"></div>
        </div>
        </div>
                <!-- Save -->
    
                <div class="d-grid mt-4">
    
                    <button id="save-button" type="button" class="
                                btn
                                aq-btn-primary
                                py-3
                            ">
                        Salvar
                    </button>
    
                </div>
    
            </div>
    
            <!-- Footer -->
    
            <div class="card-footer bg-transparent">
    
                <div class="text-center my-2">
    
                    <span class="aq-text-light">
                        Já possui uma conta?
                    </span>
    
                    <a id="login-link" href="../login/login-page.html" class="
                                ms-1
                                text-decoration-none
                                fw-semibold
                                aq-text-primary
                                aq-clickable
                            ">
                        Entrar
                    </a>
    
                </div>
    
            </div>
    
        </div>
    
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>
</html>
