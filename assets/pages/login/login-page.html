<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/icons/favicon-32.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../../css/core/reset.css" />
    <title>Entrar - AQQ</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- CSS - AQQ -->
    <link rel="stylesheet" href="../../css/core/variables.css" />
    <link rel="stylesheet" href="../../css/core/typography.css" />
    <link rel="stylesheet" href="../../css/core/utilities.css" />
    <link rel="stylesheet" href="../../css/core/animations.css" />
    <link rel="stylesheet" href="../../css/core/responsive.css" />

    <script type="module" src="./login-page.js" defer>
    </script>
</head>

<body >

    <div id="alert-container" class="position-fixed top-0 start-50 translate-middle-x aq-w-sm-100 aq-w-lg-25 p-3" style="
            z-index: 1080;
            width: min(100%, 640px);
            margin-top: 1rem;
        "></div>

    <main class="container aq-container min-vh-100 d-flex align-items-center justify-content-center pb-4 pt-3">
        <div class="w-100" style="max-width: 480px;">

            <!-- Logo -->
            <div class="d-flex justify-content-center mb-4 aq-fade-in">
                <img src="../../icons/logo-principal-horizontal.svg" alt="AQQ" class="img-fluid aq-fade-in" style="max-height: 90px;">
            </div>

            <!-- Title -->
            <div class="text-center mb-4 aq-slide-up">
                <h1 class="aq-h1 text-secondary fw-bold mb-0">
                    Entre
                </h1>
            </div>

            <!-- Card -->
            <div class="card aq-card-surface aq-shadow-sm aq-slide-up aq-radius-sm">
                <div class="card-body p-4">

                    <div class="mb-3">
                        <label for="email" class="form-label aq-h5 text-dark">
                            Email
                        </label>

                        <input id="email" type="email" class="form-control" autocomplete="email">

                        <div class="invalid-feedback" data-error-for="email"></div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label aq-h5 text-dark">
                            Senha
                        </label>

                        <input id="password" type="password" class="form-control" autocomplete="current-password">

                        <div class="invalid-feedback" data-error-for="password"></div>
                    </div>

                    <button id="login-button" type="button" class="btn aq-btn-primary w-100">
                        Entrar
                    </button>
                    <div class="text-center mt-3">
                        <a href="#" id="forgot-password-link" class="d-block text-decoration-none aq-text-light aq-clickable">
                            Recuperar senha
                        </a>
                    </div>
                </div>

                <div class="card-footer bg-transparent">
                    <div class="text-center my-3">
                        <a href="../register/register-page.html" id="register-link" class="d-block aq-h4 text-decoration-none aq-text-primary aq-clickable">
                            Criar conta
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
