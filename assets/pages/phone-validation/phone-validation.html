<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/core/reset.css" />
    <title>Validação de Telefone - AQQ</title>

    
       <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- CSS - AQQ -->
    <link rel="stylesheet" href="../../css/core/variables.css" />
    <link rel="stylesheet" href="../../css/core/typography.css" />
    <link rel="stylesheet" href="../../css/core/utilities.css" />
    <link rel="stylesheet" href="../../css/core/animations.css" />
    <link rel="stylesheet" href="../../css/core/responsive.css" />

    <script type="module" src="./phone-validation.js" defer></script>
</head>
<body>

    <div
        id="alert-container"
        class="position-fixed top-0 start-50 translate-middle-x aq-w-sm-100 aq-w-lg-25 p-3"
        style="
            z-index: 1080;
            width: min(100%, 640px);
            margin-top: 1rem;
        "
    ></div>

    <main
        class="container aq-container min-vh-100 d-flex flex-column aq-fade-in justify-content-center align-items-center py-4"
    >
        <img
            src="../../icons/favicon-32.svg"
            alt="AQQ"
            width="64"
            height="64"
            class="mb-3 aq-fade-in"
        >

        <h1 class="aq-h1 text-secondary fw-bold text-center mb-4 aq-slide-up" >
            Validação de Telefone
        </h1>

        <div class="card aq-card-surface aq-radius-sm aq-shadow-sm w-100 aq-fade-in"
            style="max-width: 480px;" >
            <div class="card-body"   id="validation-content"   >
                <p class="text-center fs-5 mb-3">
                    Para continuar, valide seu telefone.
                </p>

                <p class="text-center fw-semibold"  id="masked-phone" ></p>

                <button  id="send-code-button" type="button"  class="btn aq-btn-primary w-100">Enviar código</button>
            </div>
        </div>
    </main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>
</html>
